x-rover-service: &rover-service
  build:
    context: .
    dockerfile: Dockerfile
  command: ["python", "-m", "app.vehicles.rover"]
  depends_on:
    - control-center
  volumes:
    - .:/app

services:
  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.control_center.main"]
    depends_on:
      - mosquitto
    ports:
      - "8080:8080"
    volumes:
      - .:/app

# Vehicles and sensors do not expose their ports to the host, as communication
# occurs internally between containers via service name and not between hosts.
  vehicle-drone:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.vehicles.drone"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  vehicle-rover-1:
    <<: *rover-service
    environment:
      VEHICLE_ID: rover-1
      RPC_HOST: vehicle-rover-1
      RPC_PORT: "50052"
      POSITION_X: "9"
      POSITION_Y: "6"

  vehicle-rover-2:
    <<: *rover-service
    environment:
      VEHICLE_ID: rover-2
      RPC_HOST: vehicle-rover-2
      RPC_PORT: "50052"
      POSITION_X: "10"
      POSITION_Y: "6"

  vehicle-boat:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.vehicles.boat"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  camera:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.camera"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  sensor-water:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.water"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  sensor-vibration:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.vibration"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
